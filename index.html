<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale1.0">
    <title>Gerador de senha</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <section class="conteudo">
        <div class="coonteudo-titulo">
            <img src="unlock.svg" alt="cadeado fechado">
            <h2 class="titulo principal">Gerador de senha</h2>
            <h3 class="titulo secundario">Gere instantaneamente uma senha aleatótia e segura</h3>
        </div>
        <div class="conteudo-senha">
            <label for="senha">senha</label>
            <input name="senha" type="text" id="campo-senha">
        </div>
        <div class="parametro">
            <h3 class="parametro-titulo">Personalize sua senha</h3>
</div>
